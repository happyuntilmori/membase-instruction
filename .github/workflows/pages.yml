name: Deploy to GitHub Pages

on:
  push:
    branches:
      - claude/membase-memory-guide-4r9sn4
      - claude/ppt-html-summary-nextjs-wjqb66
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: codex-ppt/package-lock.json

      - name: Install Next.js dependencies
        run: npm ci
        working-directory: codex-ppt

      - name: Build Next.js static export
        run: npm run build
        working-directory: codex-ppt

      - name: Copy Next.js output into Jekyll site
        run: |
          mkdir -p _site/codex-ppt
          cp -r codex-ppt/out/. _site/codex-ppt/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
